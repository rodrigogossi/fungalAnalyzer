name: fungal_analyzer
description: "Análise automatizada de colônias fúngicas por visão computacional."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  tflite_flutter: ^0.12.0
  image_picker: ^1.1.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  image: ^4.2.0
  intl: ^0.19.0
  uuid: ^4.5.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FF8C00"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false

flutter_native_splash:
  color: "#FF8C00"
  image: assets/icon/icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/models/best_float32.tflite
    - assets/icon/icon.png
